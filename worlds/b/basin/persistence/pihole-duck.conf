# Pi-hole dnsmasq config for .duck TLD interception
# All *.duck queries resolve to 127.0.0.1 (containment boundary)
#
# Install: cp pihole-duck.conf /etc/dnsmasq.d/99-duck.conf && pihole restartdns
#
# This creates the hallucination benchmark boundary:
#   - Nothing leaves the local machine
#   - All .duck domains serve from yard-duck.bb HTTP server
#   - Breadcrumb navigation through DuckDB content
#
# GF(3): DNS resolution = MINUS (contraction: domain -> IP)
#
# Reference: Sucholutsky et al. 2310.13018
#   System A = browser (navigating .duck domains)
#   System B = DuckDB (generating content from schema)
#   Stimuli  = breadcrumb path segments
#   Similarity = coherence of generated content during blind navigation
#   Objective = Measuring (hallucination benchmark)
#
# Reference: Apple ParavirtualizedGraphics
#   In boxxy macOS guests: PGDevice renders .duck YARD HTML via Metal
#   In boxxy Linux guests:  VirtioGPU framebuffer (headless OK for API)

# Catch all .duck TLD queries -> loopback
address=/.duck/127.0.0.1

# Optional: also catch .duck over IPv6
address=/.duck/::1
